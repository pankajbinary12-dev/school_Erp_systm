<!DOCTYPE html>
<html>
<head>
    <title>Test Promotion AJAX</title>
    <script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
</head>
<body>
    <h1>Test Promotion Section Loading</h1>
    
    <div>
        <label>Select Class:</label>
        <select id="testClass">
            <option value="">Select Class</option>
            <option value="1">Class 1</option>
            <option value="2">Class 2</option>
            <option value="3">Class 3</option>
        </select>
    </div>
    
    <div>
        <label>Sections:</label>
        <select id="testSection">
            <option value="">Select Section</option>
        </select>
    </div>
    
    <div id="output" style="margin-top: 20px; padding: 10px; background: #f0f0f0;">
        <h3>Console Output:</h3>
        <pre id="console"></pre>
    </div>

    <script>
        function log(message) {
            console.log(message);
            $('#console').append(message + '\n');
        }

        $(document).ready(function() {
            log('jQuery loaded: ' + $.fn.jquery);
            
            $('#testClass').change(function() {
                const classId = $(this).val();
                log('Class selected: ' + classId);
                
                if (!classId) {
                    $('#testSection').html('<option value="">Select Section</option>');
                    return;
                }
                
                log('Making AJAX request to: /admin/get-sections/' + classId);
                
                $.ajax({
                    url: '/admin/get-sections/' + classId,
                    type: 'GET',
                    success: function(response) {
                        log('Response received:');
                        log(JSON.stringify(response, null, 2));
                        
                        let options = '<option value="">Select Section</option>';
                        
                        if (response.data) {
                            log('Found ' + response.data.length + ' sections');
                            response.data.forEach(function(section) {
                                options += '<option value="' + section.id + '">' + section.section_name + '</option>';
                            });
                        } else {
                            log('No data property in response');
                        }
                        
                        $('#testSection').html(options);
                        log('Sections loaded successfully');
                    },
                    error: function(xhr, status, error) {
                        log('ERROR: ' + error);
                        log('Status: ' + status);
                        log('Response: ' + xhr.responseText);
                    }
                });
            });
        });
    </script>
</body>
</html>
